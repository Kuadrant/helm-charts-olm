{{ if .Values.tools.vault.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-pod-exec
  namespace: {{ .Values.vault.global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-pod-exec
subjects:
- kind: ServiceAccount
  name: vault
  namespace: {{ .Values.vault.global.namespace }}
{{end}}
